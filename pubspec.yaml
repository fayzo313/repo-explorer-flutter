name: github_repo_explorer
description: >
  A production-quality portfolio app that lets you search GitHub repositories,
  inspect details, and save favorites offline. Built to demonstrate Clean
  Architecture, Riverpod, Repository Pattern and offline-first caching.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Local database (Drift = type-safe SQL over SQLite, most "professional"
  # choice for relational, queryable, testable persistence)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Environment config
  flutter_dotenv: ^5.1.0

  # UI polish
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env
